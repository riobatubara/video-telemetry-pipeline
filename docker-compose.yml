services:
  kafka:
    image: apache/kafka:3.7.0
    container_name: telemetry_kafka
    ports:
      - "19092:19092"
    environment:
      # KRaft
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'

      # LISTENERS (FIX)
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,EXTERNAL://0.0.0.0:19092,CONTROLLER://0.0.0.0:9093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092,EXTERNAL://localhost:19092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'

      # OPTIONAL
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'

      # CLUSTER
      CLUSTER_ID: 'KzTRtFTTTAS7ZOaPQv9IQw'
      KAFKA_LOG_DIRS: '/var/lib/kafka/data'

      # SINGLE NODE SAFE
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

      # RETENTION
      KAFKA_LOG_RETENTION_HOURS: 72
      KAFKA_LOG_RETENTION_BYTES: 1073741824
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/9092'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - telemetry_network

  kafka-init:
    image: apache/kafka:3.7.0
    container_name: telemetry_kafka_init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "
      echo 'Creating topics...';
      /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --topic ${KAFKA_TOPIC_RAW} --bootstrap-server kafka:9092 --partitions 3 --replication-factor 1;
      /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --topic ${KAFKA_TOPIC_DLQ} --bootstrap-server kafka:9092 --partitions 1 --replication-factor 1;
      echo 'Topics ready';
      "
    networks:
      - telemetry_network

  # ClickHouse
  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    container_name: telemetry_clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      - CLICKHOUSE_DB=${CLICKHOUSE_DB}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
    volumes:
      - ./database/clickhouse:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - telemetry_network

  # API Gateway
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: telemetry_api_gateway
    ports:
      - "${API_PORT}:8080"
    environment:
      - API_PORT=8080
      - KAFKA_BROKERS=${KAFKA_BROKERS}
      - KAFKA_TOPIC_RAW=${KAFKA_TOPIC_RAW}
      - KAFKA_TOPIC_DLQ=${KAFKA_TOPIC_DLQ}
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    networks:
      - telemetry_network

  jobmanager:
    image: flink:1.18.1-scala_2.12-java17
    container_name: flink_jobmanager
    command: jobmanager
    ports:
      - "8081:8081"
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
    networks:
      - telemetry_network

  taskmanager:
    image: flink:1.18.1-scala_2.12-java17
    container_name: flink_taskmanager
    depends_on:
      - jobmanager
    command: taskmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 4
    networks:
      - telemetry_network

  # Stream Processor
  stream-processor:
    build:
      context: ./stream-processor
      dockerfile: Dockerfile
    container_name: telemetry_stream_processor
    environment:
      - KAFKA_BROKERS=${KAFKA_BROKERS}
      - KAFKA_TOPIC_RAW=${KAFKA_TOPIC_RAW}
      - KAFKA_TOPIC_DLQ=${KAFKA_TOPIC_DLQ}
      - KAFKA_GROUP_RAW=${KAFKA_GROUP_RAW}
      - KAFKA_GROUP_DLQ=${KAFKA_GROUP_DLQ}
      - CLICKHOUSE_HOST=${CLICKHOUSE_HOST}
      - CLICKHOUSE_PORT=${CLICKHOUSE_PORT}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
      - CLICKHOUSE_DB=${CLICKHOUSE_DB}
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      clickhouse:
        condition: service_healthy
      jobmanager:
        condition: service_started
      taskmanager:
        condition: service_started
    networks:
      - telemetry_network

  # Video Analytics
