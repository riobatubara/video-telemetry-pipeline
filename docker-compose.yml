services:
  kafka:
    image: apache/kafka:3.7.0
    container_name: telemetry_kafka
    ports:
      - "19092:19092"
    environment:
      # Cluster Setup Configurations
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT'
      
      # Cluster ID generation (Required for KRaft metadata log partition)
      CLUSTER_ID: 'KzTRtFTTTAS7ZOaPQv9IQw'
      
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: '/var/lib/kafka/data'

      KAFKA_LOG_RETENTION_HOURS: 72
      KAFKA_LOG_RETENTION_BYTES: 1073741824
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/9092'"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - telemetry_network

  # Real-Time OLAP Storage (ClickHouse)
  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    container_name: telemetry_clickhouse
    ports:
      - "8123:8123"                                       # HTTP client port
      - "9000:9000"                                       # Native client port (used by Flink and Go)
    environment:
      - CLICKHOUSE_DB=${CLICKHOUSE_DB}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
      # - CLICKHOUSE_MAX_INSERT_BLOCK_SIZE=100000         -- production grade
      # - CLICKHOUSE_MAX_THREADS=8                        -- production grade 
    volumes:
      - ./database/clickhouse:/docker-entrypoint-initdb.d # Auto-executes 01, 02, and 03 schema
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - telemetry_network

  # Analytics Mart Storage
  postgres:
    image: postgres:16-alpine
    container_name: telemetry_mart_storage
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - ./database/postgres:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - telemetry_network

  # API Gateway
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: telemetry_api_gateway
    ports:
      - "${API_PORT}:8080"
    environment:
      - API_PORT=8080
      - KAFKA_BROKERS=${KAFKA_BROKERS}
      - KAFKA_TOPIC_RAW=${KAFKA_TOPIC_RAW}
      - KAFKA_TOPIC_DLQ=${KAFKA_TOPIC_DLQ}
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - telemetry_network

  # Real-Time Stream Processor (PyFlink Worker)
  stream-processor:
    build:
      context: ./stream-processor
      dockerfile: Dockerfile
    container_name: telemetry_stream_processor
    environment:
      - KAFKA_BROKERS=${KAFKA_BROKERS}
      - KAFKA_TOPIC_RAW=${KAFKA_TOPIC_RAW}
      - KAFKA_TOPIC_DLQ=${KAFKA_TOPIC_DLQ}
      - KAFKA_GROUP_RAW=${KAFKA_GROUP_RAW}
      - KAFKA_GROUP_DLQ=${KAFKA_GROUP_DLQ}
      - CLICKHOUSE_HOST=${CLICKHOUSE_HOST}
      - CLICKHOUSE_PORT=${CLICKHOUSE_PORT}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
      - CLICKHOUSE_DB=${CLICKHOUSE_DB}
    depends_on:
      kafka:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    networks:
      - telemetry_network

networks:
  telemetry_network:
    driver: bridge

volumes:
  kafka_data: